<!DOCTYPE html>
<html lang="pt-BR" style="scroll-behavior: smooth;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Kassiane</title>

    <style>
        :root {
            --bg-main: #0A0A12;
            --bg-card: #151225;
            --border-color: #2A2440;
            --accent: #A78BFA;
            --text-main: #FFFFFF;
            --text-sec: #9CA3AF;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-main);
            line-height: 1.6;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .portfolio-container {
            max-width: 900px;
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            background-color: var(--bg-main);
        }

        /* MENU */
        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1rem 2rem;
            background-color: rgba(10,10,18,0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-link {
            color: var(--text-sec);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 600;
            position: relative;
            transition: color .3s;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width .3s ease;
        }

        .nav-link:hover {
            color: var(--accent);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* HERO */
        .hero {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 2rem;
            padding: 3rem;
            border-bottom: 1px solid var(--border-color);
        }

        .hero-label {
            color: var(--accent);
            font-size: .75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .hero-name {
            font-size: 2.3rem;
            margin-bottom: .5rem;
        }

        .hero-title {
            font-size: .8rem;
            color: var(--text-sec);
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        .hero-desc {
            color: var(--text-sec);
            margin-bottom: 2rem;
            max-width: 90%;
        }

        /* BOTÃO */
        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            padding: .8rem 1.6rem;
            background: var(--accent);
            color: #0A0A12;
            font-weight: 700;
            border-radius: 8px;
            text-decoration: none;
            transition: transform .3s, box-shadow .3s;
        }

        .btn-download:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(167,139,250,.35);
        }

        /* CARDS */
        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.2rem;
            transition: transform .4s ease, box-shadow .4s ease, border .4s;
        }

        .project-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,.45);
            border-color: var(--accent);
        }

        /* ANIMAÇÕES */
        .hidden-fade {
            opacity: 0;
            transform: translateY(40px) scale(.97);
            transition: opacity .8s ease, transform .8s ease;
        }

        .hidden-slide-left {
            opacity: 0;
            transform: translateX(-60px);
            transition: opacity .8s ease, transform .8s ease;
        }

        .hidden-slide-right {
            opacity: 0;
            transform: translateX(60px);
            transition: opacity .8s ease, transform .8s ease;
        }

        .show-animation {
            opacity: 1;
            transform: translate(0) scale(1);
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            .hero {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<div class="portfolio-container">

    <nav class="nav-menu">
        <a href="#sobre" class="nav-link">Sobre</a>
        <a href="#habilidades" class="nav-link">Habilidades</a>
        <a href="#projetos" class="nav-link">Projetos</a>
        <a href="#estudos" class="nav-link">Estudos</a>
    </nav>

    <header class="hero hidden-fade">
        <div>
            <p class="hero-label">Portfólio</p>
            <h1 class="hero-name">Kassiane Gomes da Silva</h1>
            <p class="hero-title">DESENVOLVEDORA FRONT-END & MOBILE</p>
            <p class="hero-desc">
                Apaixonada por criar interfaces modernas e experiências digitais funcionais.
            </p>
            <a href="#" class="btn-download">Download CV</a>
        </div>
    </header>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if(entry.isIntersecting){
                entry.target.classList.add("show-animation");
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.15 });

    document
      .querySelectorAll('.hidden-fade,.hidden-slide-left,.hidden-slide-right')
      .forEach(el => observer.observe(el));
});
</script>

</body>
</html>
